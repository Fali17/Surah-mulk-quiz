<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk: Ultimate Scholar Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --hint: #f39c12; --audio: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; color: var(--primary); }
        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 10px 20px; border-radius: 50px; margin-bottom: 15px; font-weight: bold; }
        .points-text { color: var(--success); }
        .hidden-points { display: none !important; }
        .translation { font-style: italic; color: #7f8c8d; margin: 10px 0; font-size: 0.95rem; line-height: 1.4; }
        .drop-zone { min-height: 80px; border: 2px dashed var(--accent); border-radius: 12px; margin: 15px 0; padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; padding: 15px; border-top: 1px solid #eee; }
        .word { background: var(--accent); color: white; padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; user-select: none; }
        .word.placed { background: var(--primary); }
        .status-msg { margin-top: 15px; font-weight: bold; min-height: 1.5em; }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
        select, button { padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        .btn-next { background: var(--success); color: white; display: none; width: 100%; margin-top: 10px; padding: 15px; border: none; font-size: 1.1rem; }
        .nav-btn { background: #95a5a6; color: white; border: none; }
        .correct-state { border-color: var(--success) !important; background: #f0fff4 !important; }
        .toggle-active { background: #2ecc71 !important; color: white; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="stats-bar" id="stats-ui">
        <span>Verse <span id="v-num">1</span>/30</span>
        <span class="points-text">Score: <span id="score">100</span></span>
    </div>

    <div class="controls">
        <select id="reciter-select">
            <optgroup label="Minshawi">
                <option value="6">Siddiq al-Minshawi (Murattal)</option>
                <option value="11">Siddiq al-Minshawi (with Kids)</option>
            </optgroup>
            <optgroup label="Abdul Basit">
                <option value="2">Abdul Basit (Murattal)</option>
                <option value="1">Abdul Basit (Mujawwad)</option>
            </optgroup>
            <optgroup label="Popular">
                <option value="7">Mishary Rashid Alafasy</option>
                <option value="3">Abdur-Rahman as-Sudais</option>
                <option value="12">Mahmoud Khalil Al-Husary</option>
                <option value="4">Abu Bakr al-Shatri</option>
                <option value="5">Hani ar-Rifa'i</option>
                <option value="9">Mohamed Siddiq al-Minshawi (Mujawwad)</option>
                <option value="10">Saud al-Shuraim</option>
                <option value="13">Ali Al-Huthaify</option>
            </optgroup>
        </select>
        <select id="jump-select" onchange="jumpToVerse(this.value)"></select>
        <button id="points-toggle" onclick="togglePoints()" class="toggle-active">Points: ON</button>
    </div>

    <div class="translation" id="trans-text"></div>
    <div class="drop-zone" id="drop-zone"></div>
    <div class="word-bank" id="word-bank"></div>
    <div id="status-msg" class="status-msg"></div>

    <div class="controls">
        <button style="background: var(--audio); color:white;" onclick="playRecitation()">🔊 Listen</button>
        <button style="background: var(--hint); color:white;" onclick="giveHint()">💡 Hint</button>
        <button onclick="toggleMode()">🔄 Toggle Mode</button>
        <button class="nav-btn" onclick="prevVerse()">⬅ Prev</button>
        <button class="nav-btn" onclick="nextVerse()">Next ➡</button>
    </div>

    <button id="next-btn" class="btn-next" onclick="nextVerse()">Move to Next Verse</button>
    <audio id="quran-audio"></audio>
</div>

<script>
    const surahData = [
        { id: 1, words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"], trans: "Blessed is He in whose hand is dominion, and He is over all things competent." },
        { id: 2, words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan", "wa-huwa", "al-’azīzu", "al-ghafūr"], trans: "[He] who created death and life to test you..." },
        { id: 3, words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni", "min", "tafāwutin", "farji’i", "al-basara", "hal", "tarā", "min", "futūr"], trans: "[And] who created seven heavens in layers..." },
        { id: 4, words: ["thumma", "arji’i", "al-basara", "karratayni", "yanqalib", "ilayka", "al-basaru", "khāsi’an", "wa-huwa", "hasīr"], trans: "Then return [your] vision twice again..." },
        { id: 5, words: ["wa-laqad", "zayyannā", "as-samā’a", "ad-dunyā", "bi-masābīha", "wa-ja’alnāhā", "rujūman", "lish-shayātīni", "wa-’atadnā", "lahum", "’adhāba", "as-sa’īr"], trans: "And We have certainly beautified the nearest heaven..." },
        { id: 6, words: ["wa-lilladhīna", "kafarū", "bi-rabbihim", "’adhābu", "jahannama", "wa-bi’sa", "al-masīr"], trans: "And for those who have disbelieved in their Lord is the punishment..." },
        { id: 7, words: ["idhā", "ulqū", "fīhā", "sami’ū", "lahā", "shahīqan", "wa-hiya", "tafūr"], trans: "When they are thrown into it, they hear from it a dreadful inhaling..." },
        { id: 8, words: ["takādu", "tamayyazu", "mina", "al-ghayzi", "kullamā", "ulqiya", "fīhā", "fawjun", "sa’alahum", "khazanatuhā", "alam", "ya’tikum", "nadhīr"], trans: "It almost bursts with rage..." },
        { id: 9, words: ["qālū", "balā", "qad", "jā’anā", "nadhīrun", "fa-kadh-dhabnā", "wa-qulnā", "mā", "nazzala", "Allāhu", "min", "shay’in", "in", "antum", "illā", "fī", "dalālin", "kabīr"], trans: "They will say, 'Yes, a warner had come to us...'" },
        { id: 10, words: ["wa-qālū", "law", "kunnā", "nasma’u", "aw", "na’qilu", "mā", "kunnā", "fī", "ashābi", "as-sa’īr"], trans: "And they will say, 'If only we had been listening...'" },
        { id: 11, words: ["fa-’tarafū", "bi-dhambihim", "fa-suhqan", "li-ashābi", "as-sa’īr"], trans: "And they will admit their sin..." },
        { id: 12, words: ["inna", "alladhīna", "yakhshowna", "rabbahum", "bi-l-ghaybi", "lahum", "maghfiratun", "wa-ajrun", "kabīr"], trans: "Indeed, those who fear their Lord unseen will have forgiveness..." },
        { id: 13, words: ["wa-asirrū", "qawlakum", "awi", "ijharū", "bihi", "innahu", "’alīmun", "bi-dhāti", "as-sudūr"], trans: "And conceal your speech or publicize it..." },
        { id: 14, words: ["alā", "ya’lamu", "man", "khalaqa", "wa-huwa", "al-latīfu", "al-khabīr"], trans: "Does He who created not know..." },
        { id: 15, words: ["huwa", "alladhī", "ja’ala", "lakumu", "al-arda", "dhalūlan", "fa-mshū", "fī", "manākibihā", "wa-kulū", "min", "rizqihi", "wa-ilayhi", "an-nushūr"], trans: "It is He who made the earth tame for you..." },
        { id: 16, words: ["a-amintum", "man", "fī", "as-samā’i", "an", "yakhsifa", "bikumu", "al-arda", "fa-idhā", "hiya", "tamūr"], trans: "Do you feel secure that He would not cause the earth to swallow you?" },
        { id: 17, words: ["am", "amintum", "man", "fī", "as-samā’i", "an", "yursila", "’alaykum", "hāsiban", "fa-sata’lamūna", "kayfa", "nadhīr"], trans: "Or do you feel secure that He would not send a storm of stones?" },
        { id: 18, words: ["wa-laqad", "kadh-dhaba", "alladhīna", "min", "qablihim", "fa-kayfa", "kāna", "nakīr"], trans: "And already had those before them denied..." },
        { id: 19, words: ["awalam", "yaraw", "ilā", "at-tayri", "fawqahum", "sāffātin", "wa-yaqbidna", "mā", "yumsikuhunna", "illā", "ar-rahmānu", "innahu", "bi-kulli", "shay’in", "basīr"], trans: "Do they not see at the birds above them..." },
        { id: 20, words: ["am-man", "hādhā", "alladhī", "huwa", "jundun", "lakum", "yansurukum", "min", "dūni", "ar-rahmāni", "ini", "al-kāfirūna", "illā", "fī", "ghurūr"], trans: "Or who is it that could be an army for you..." },
        { id: 21, words: ["am-man", "hādhā", "alladhī", "yarzuqukum", "in", "amsaka", "rizqahu", "bal", "lajjū", "fī", "’utuwwin", "wa-nufūr"], trans: "Or who is it that could provide for you if He withheld provision?" },
        { id: 22, words: ["afa-man", "yamshī", "mukibban", "’alā", "wajhihi", "ahdā", "am-man", "yamshī", "sawiyyan", "’alā", "sirātin", "mustaqīm"], trans: "Is one who walks fallen on his face better guided?" },
        { id: 23, words: ["qul", "huwa", "alladhī", "ansha’akum", "wa-ja’ala", "lakumu", "as-sam’a", "wa-l-absāra", "wa-l-af’idata", "qalīlan", "mā", "tashkurūn"], trans: "Say, 'It is He who has produced you...'" },
        { id: 24, words: ["qul", "huwa", "alladhī", "dhara’akum", "fī", "al-ardi", "wa-ilayhi", "tuhsharūn"], trans: "Say, 'It is He who has multiplied you throughout the earth...'" },
        { id: 25, words: ["wa-yaqūlūna", "matā", "hādhā", "al-wa’du", "in", "kuntum", "sādiqīn"], trans: "And they say, 'When is this promise...'" },
        { id: 26, words: ["qul", "innamā", "al-’ilmu", "’inda", "Allāhi", "wa-innamā", "ana", "nadhīrun", "mubīn"], trans: "Say, 'The knowledge is only with Allah...'" },
        { id: 27, ["fa-lammā", "ra’awhu", "zulfatan", "sī’at", "wujūhu", "alladhīna", "kafarū", "wa-qīla", "hādhā", "alladhī", "kuntum", "bihi", "tadda’ūn"], trans: "But when they see it approaching, the faces will be distressed..." },
        { id: 28, words: ["qul", "ara’aytum", "in", "ahlakaniya", "Allāhu", "wa-man", "ma’iya", "aw", "rahimanā", "fa-man", "yujīru", "al-kāfirīna", "min", "’adhābin", "alīm"], trans: "Say, 'If Allah should cause my death...'" },
        { id: 29, words: ["qul", "huwa", "ar-rahmānu", "āmannā", "bihi", "wa-’alayhi", "tawakkalnā", "fa-sata’lamūna", "man", "huwa", "fī", "dalālin", "mubīn"], trans: "Say, 'He is the Most Merciful; we have believed...'" },
        { id: 30, words: ["qul", "ara’aytum", "in", "asbaha", "mā’ukum", "ghawran", "fa-man", "ya’tīkum", "bi-mā’in", "ma’īn"], trans: "Say, 'If your water was to become sunken...'" }
    ];

    let currentIdx = 0, score = 100, mode = 'order', userSeq = [], bank = [], listenCount = 0, hiddenIdx = -1, isCorrect = false, pointsEnabled = true;

    function init() {
        const jump = document.getElementById('jump-select');
        if(jump.options.length === 0) {
            surahData.forEach((v, i) => jump.add(new Option(`Verse ${i+1}`, i)));
        }
        loadVerse();
    }

    function togglePoints() {
        pointsEnabled = !pointsEnabled;
        const btn = document.getElementById('points-toggle');
        const stats = document.getElementById('stats-ui').querySelector('.points-text');
        if(pointsEnabled) {
            btn.innerText = "Points: ON";
            btn.classList.add('toggle-active');
            stats.classList.remove('hidden-points');
        } else {
            btn.innerText = "Points: OFF";
            btn.classList.remove('toggle-active');
            stats.classList.add('hidden-points');
        }
    }

    function loadVerse() {
        isCorrect = false;
        const verse = surahData[currentIdx];
        document.getElementById('v-num').innerText = currentIdx + 1;
        document.getElementById('jump-select').value = currentIdx;
        document.getElementById('trans-text').innerText = verse.trans;
        document.getElementById('status-msg').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('drop-zone').classList.remove('correct-state');
        userSeq = []; listenCount = 0;
        bank = [...verse.words].sort(() => Math.random() - 0.5);
        hiddenIdx = (mode === 'fill') ? Math.floor(Math.random() * verse.words.length) : -1;
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        if(pointsEnabled && score <= 0) { 
            alert("Game Over! Score hit 0. Resetting to 100."); 
            score = 100; currentIdx = 0; loadVerse(); return; 
        }

        const dropEl = document.getElementById('drop-zone'), bankEl = document.getElementById('word-bank'), verse = surahData[currentIdx];
        dropEl.innerHTML = ""; bankEl.innerHTML = "";

        if(mode === 'order') {
            userSeq.forEach((w, i) => {
                let d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
                d.onclick = () => { if(!isCorrect) { userSeq.splice(i,1); updateUI(); } };
                dropEl.appendChild(d);
            });
            let tempUser = [...userSeq];
            bank.forEach(w => {
                let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
                if(tempUser.includes(w)) { d.style.visibility = "hidden"; tempUser.splice(tempUser.indexOf(w),1); }
                else { d.onclick = () => handleSelection(w); }
                bankEl.appendChild(d);
            });
        } else {
            verse.words.forEach((w, i) => {
                let d = document.createElement('div');
                if(i === hiddenIdx && userSeq.length === 0) { d.className = 'word blank-space'; d.innerText = "___"; }
                else { d.className = 'word placed'; d.innerText = (i === hiddenIdx) ? userSeq[0] : w; }
                dropEl.appendChild(d);
            });
            bank.forEach(w => {
                let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
                d.onclick = () => handleSelection(w);
                if(userSeq.includes(w)) d.style.opacity = "0.3";
                bankEl.appendChild(d);
            });
        }
    }

    function handleSelection(w) {
        if(isCorrect) return;
        const verse = surahData[currentIdx];
        const status = document.getElementById('status-msg');

        if(mode === 'order') {
            const nextCorrect = verse.words[userSeq.length];
            if(w === nextCorrect) {
                userSeq.push(w);
                if(pointsEnabled) score += 5;
                status.innerText = "✅ Correct Word!";
                status.style.color = "var(--success)";
            } else {
                if(pointsEnabled) score -= 5;
                status.innerText = "❌ Wrong Word! Tap correctly to continue.";
                status.style.color = "var(--danger)";
            }
        } else {
            if(w === verse.words[hiddenIdx]) {
                userSeq = [w];
                if(pointsEnabled) score += 5;
                status.innerText = "✅ Correct!";
                status.style.color = "var(--success)";
            } else {
                if(pointsEnabled) score -= 5;
                status.innerText = "❌ Wrong choice.";
                status.style.color = "var(--danger)";
            }
        }
        
        if(userSeq.length === (mode === 'order' ? verse.words.length : 1) && !isCorrect) checkWin();
        updateUI();
    }

    function checkWin() {
        const verse = surahData[currentIdx];
        let won = (mode === 'order') ? JSON.stringify(userSeq) === JSON.stringify(verse.words) : userSeq[0] === verse.words[hiddenIdx];
        if(won) {
            isCorrect = true;
            if(pointsEnabled) score += 10;
            document.getElementById('status-msg').innerText = `✨ Verse Mastered! | Listened ${listenCount} times.`;
            document.getElementById('drop-zone').classList.add('correct-state');
            document.getElementById('next-btn').style.display = "block";
        }
    }

    async function playRecitation() {
        if(!isCorrect && pointsEnabled) { score -= 5; listenCount++; updateUI(); }
        const rId = document.getElementById('reciter-select').value;
        const vNum = currentIdx + 1;
        try {
            const res = await fetch(`https://api.quran.com/api/v4/recitations/${rId}/by_ayah/67:${vNum}`);
            const data = await res.json();
            const audio = document.getElementById('quran-audio');
            let url = data.audio_files[0].url;
            audio.src = url.startsWith('http') ? url : `https://verses.quran.com/${url}`;
            audio.play();
        } catch(e) { alert("Audio server error. Please try another reciter."); }
    }

    function giveHint() {
        if(isCorrect) return;
        if(pointsEnabled) score -= 5;
        const verse = surahData[currentIdx];
        let target = (mode === 'order') ? verse.words[userSeq.length] : verse.words[hiddenIdx];
        const btns = document.querySelectorAll('#word-bank .word');
        btns.forEach(b => { if(b.innerText === target) { b.style.background = "var(--hint)"; setTimeout(() => b.style.background = "var(--accent)", 1000); } });
        updateUI();
    }

    function jumpToVerse(val) { currentIdx = parseInt(val); loadVerse(); }
    function toggleMode() { mode = (mode === 'order') ? 'fill' : 'order'; loadVerse(); }
    function prevVerse() { if(currentIdx > 0) { currentIdx--; loadVerse(); } }
    function nextVerse() { if(currentIdx < 29) { currentIdx++; loadVerse(); } else { alert("Mubarak!"); currentIdx = 0; loadVerse(); } }

    window.onload = init;
</script>
</body>
</html>
