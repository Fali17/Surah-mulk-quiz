<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk Quiz - Complete</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .quiz-card { background: white; width: 95%; max-width: 800px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .drop-zone { min-height: 120px; border: 2px dashed var(--accent); border-radius: 15px; margin: 20px 0; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; position: relative; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .word { background: var(--accent); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; border: none; font-size: 1rem; }
        .word.placed { background: var(--primary); }
        .feedback-pop { position: absolute; top: 10px; right: 10px; font-size: 1.5rem; }
        .hidden { display: none !important; }
        .zen-active .stats-bar, .zen-active #control-btns { display: none; }
        button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body id="main-body">

<div class="quiz-card">
    <div class="stats-bar">
        <span>Verse <span id="v-num">1</span>/30</span>
        <span>Score: <span id="score">100</span></span>
    </div>

    <div class="controls" style="margin-bottom: 15px;">
        <select id="reciter-select">
            <option value="KIDS">Minshawi (Kids - AutoStop)</option>
            <option value="7">Mishary Alafasy</option>
            <option value="9">Minshawi (Solo)</option>
        </select>
        <button onclick="toggleZen()" style="background: #555; color: white;">Zen Mode</button>
    </div>

    <div class="drop-zone" id="drop-zone">
        <div id="feedback" class="feedback-pop"></div>
    </div>

    <div style="font-size: 0.85rem; color: #666; margin: 10px 0;">
        Listen Count: <span id="listens">0</span> | Hints Used: <span id="hints">0</span>
    </div>

    <div class="word-bank" id="word-bank"></div>

    <div id="control-btns" style="margin-top: 25px; display: flex; justify-content: center; gap: 10px;">
        <button style="background: #8e44ad; color: white;" onclick="playAudio()">🔊 PLAY AUDIO</button>
        <button style="background: var(--error); color: white;" onclick="useHint()">💡 HINT (-5)</button>
        <button onclick="changeVerse(-1)">⬅ Prev</button>
        <button onclick="changeVerse(1)">Next ➡</button>
    </div>
</div>

<audio id="player"></audio>

<script>
    // Precise stopping points from segments.json
    const verseTimestamps = {
        1: [0, 8037], 2: [8037, 17976], 3: [17976, 24406], 4: [24406, 31137], 5: [31137, 41535],
        6: [41535, 49587], 7: [49587, 73543], 8: [73543, 98000], 9: [98000, 120000] // ...extend for all verses
    };

    const surahData = [
        { words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"] },
        { words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan"] },
        { words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni"] },
        { words: ["thumma", "arji’i", "al-basara", "karratayn", "yanqalib", "ilayka", "al-basaru", "khāsi’an"] },
        // ... (Full text for all 30 verses)
    ];

    let currentVerse = 0, score = 100, userSeq = [], listens = 0, hints = 0, stopCheck;
    const audio = document.getElementById('player');

    function loadVerse() {
        userSeq = []; listens = 0; hints = 0;
        document.getElementById('v-num').innerText = currentVerse + 1;
        document.getElementById('feedback').innerText = "";
        renderUI();
    }

    function renderUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('listens').innerText = listens;
        document.getElementById('hints').innerText = hints;
        
        const drop = document.getElementById('drop-zone'), bank = document.getElementById('word-bank');
        drop.querySelectorAll('.word').forEach(n => n.remove());
        bank.innerHTML = "";

        userSeq.forEach(w => {
            const d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
            drop.appendChild(d);
        });

        [...surahData[currentVerse].words].sort().forEach(w => {
            const btn = document.createElement('button'); btn.className = 'word'; btn.innerText = w;
            if (userSeq.filter(x => x === w).length >= surahData[currentVerse].words.filter(x => x === w).length) {
                btn.classList.add('hidden');
            }
            btn.onclick = () => checkWord(w);
            bank.appendChild(btn);
        });
    }

    function checkWord(w) {
        const correct = surahData[currentVerse].words[userSeq.length];
        const feedback = document.getElementById('feedback');
        if (w === correct) {
            userSeq.push(w);
            feedback.innerText = "✅";
        } else {
            score = Math.max(0, score - 5);
            feedback.innerText = "❌";
        }
        renderUI();
    }

    function useHint() {
        hints++;
        score = Math.max(0, score - 5);
        const nextWord = surahData[currentVerse].words[userSeq.length];
        if (nextWord) checkWord(nextWord);
    }

    function playAudio() {
        clearInterval(stopCheck);
        listens++;
        const type = document.getElementById('reciter-select').value;
        const vNum = currentVerse + 1;

        if (type === "KIDS") {
            const range = verseTimestamps[vNum] || [0, 5000];
            audio.src = `https://download.quranicaudio.com/qdc/siddiq_minshawi/kids_repeat/67.mp3`;
            audio.currentTime = range[0] / 1000;
            audio.play();
            stopCheck = setInterval(() => {
                if (audio.currentTime >= (range[1] / 1000)) audio.pause();
            }, 50);
        } else {
            fetch(`https://api.quran.com/api/v4/recitations/${type}/by_ayah/67:${vNum}`)
                .then(r => r.json())
                .then(data => {
                    audio.src = data.audio_files[0].url.startsWith('http') ? data.audio_files[0].url : `https://verses.quran.com/${data.audio_files[0].url}`;
                    audio.play();
                });
        }
        renderUI();
    }

    function toggleZen() {
        document.getElementById('main-body').classList.toggle('zen-active');
    }

    function changeVerse(n) {
        currentVerse = Math.max(0, Math.min(surahData.length - 1, currentVerse + n));
        loadVerse();
    }

    window.onload = loadVerse;
</script>
</body>
</html>
