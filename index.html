<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk: Precision Memorizer</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --hint-color: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; }
        .quiz-card { background: white; width: 100%; max-width: 850px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        
        /* THE UNSTOPPABLE HINT */
        @keyframes extremeHint {
            0% { transform: scale(1); background: var(--accent); }
            50% { transform: scale(1.4); background: #ff0000; box-shadow: 0 0 40px #ff0000; color: white; }
            100% { transform: scale(1); background: var(--accent); }
        }
        .hint-active { animation: extremeHint 0.5s ease-in-out infinite; z-index: 999 !important; border: 3px solid black !important; position: relative; }

        .drop-zone { min-height: 90px; border: 2px dashed var(--accent); border-radius: 15px; margin: 20px 0; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; border-top: 2px solid #eee; }
        .word { background: var(--accent); color: white; padding: 12px 18px; border-radius: 10px; cursor: pointer; user-select: none; font-size: 1.1rem; }
        .word.placed { background: var(--primary); }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button, select { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        .zen-hidden { display: none !important; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="stats-bar" id="score-container">
        <span>Verse <span id="v-num">1</span>/30</span>
        <span>Score: <span id="score">100</span></span>
    </div>

    <div class="controls">
        <select id="reciter-select">
            <option value="168">Minshawi (Kids Repeating)</option>
            <option value="9">Minshawi (Murattal)</option>
            <option value="12">Al-Husary</option>
            <option value="7">Mishary Alafasy</option>
        </select>
        <button onclick="toggleZen()" id="zen-btn" style="background: #34495e; color: white;">🧘 Zen Mode: Off</button>
        <button onclick="toggleMode()" style="background: #34495e; color: white;">🔄 Game: <span id="mode-label">Ordering</span></button>
    </div>

    <div id="trans-text" style="color: #7f8c8d; font-style: italic; margin-bottom: 15px; font-size: 1.1rem;"></div>
    <div class="drop-zone" id="drop-zone"></div>
    <div class="word-bank" id="word-bank"></div>

    <div class="controls">
        <button style="background: #8e44ad; color:white; width: 150px;" onclick="playAudio()">🔊 PLAY AUDIO</button>
        <button style="background: var(--hint-color); color:white; width: 100px;" onclick="giveHint()">💡 HINT</button>
        <button onclick="prevVerse()">⬅ Prev</button>
        <button onclick="nextVerse()">Next ➡</button>
    </div>

    <audio id="quran-audio"></audio>
</div>

<script>
    const surahData = [
        { id: 1, words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"], trans: "Blessed is He in whose hand is dominion..." },
        { id: 2, words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan", "wa-huwa", "al-’azīzu", "al-ghafūr"], trans: "He who created death and life to test you..." },
        { id: 3, words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni", "min", "tafāwutin", "farji’i", "al-basara", "hal", "tarā", "min", "futūr"], trans: "Who created seven heavens in layers..." }
    ];

    // Build the rest of the 30 verses
    for(let i=4; i<=30; i++) surahData.push({id: i, words: ["Verse", i, "Practice"], trans: "Practice Verse "+i});

    let currentIdx = 0, score = 100, userSeq = [], isCorrect = false, mode = "order", hiddenIdx = -1, zen = false;

    function toggleZen() {
        zen = !zen;
        document.getElementById('score-container').classList.toggle('zen-hidden');
        document.getElementById('zen-btn').innerText = zen ? "🧘 Zen Mode: On" : "🧘 Zen Mode: Off";
    }

    function loadVerse() {
        isCorrect = false;
        const verse = surahData[currentIdx];
        document.getElementById('v-num').innerText = currentIdx + 1;
        document.getElementById('trans-text').innerText = verse.trans;
        userSeq = [];
        if(mode === "missing") hiddenIdx = Math.floor(Math.random() * verse.words.length);
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        const dropEl = document.getElementById('drop-zone'), bankEl = document.getElementById('word-bank'), verse = surahData[currentIdx];
        dropEl.innerHTML = ""; bankEl.innerHTML = "";

        if(mode === "order") {
            userSeq.forEach((w, i) => {
                let d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
                d.onclick = () => { if(!isCorrect) { userSeq.splice(i,1); updateUI(); } };
                dropEl.appendChild(d);
            });
        } else {
            verse.words.forEach((w, i) => {
                let d = document.createElement('div');
                d.className = (i === hiddenIdx && !isCorrect) ? 'word' : 'word placed';
                d.innerText = (i === hiddenIdx && !isCorrect) ? "???" : w;
                if (i === hiddenIdx && !isCorrect) d.style.background = "#ddd";
                dropEl.appendChild(d);
            });
        }

        [...verse.words].sort().forEach(w => {
            let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
            if(mode === "order" && userSeq.filter(x => x === w).length >= verse.words.filter(x => x === w).length) d.style.visibility = "hidden";
            d.onclick = () => handleSelection(w);
            bankEl.appendChild(d);
        });
    }

    function handleSelection(w) {
        if(isCorrect) return;
        const verse = surahData[currentIdx];
        let correct = (mode === "order") ? (w === verse.words[userSeq.length]) : (w === verse.words[hiddenIdx]);
        if(correct) {
            if(mode === "order") { userSeq.push(w); if(userSeq.length === verse.words.length) isCorrect = true; } 
            else { isCorrect = true; }
            if(!zen) score += 5;
        } else { if(!zen) score -= 5; }
        updateUI();
    }

    function giveHint() {
        if(isCorrect) return;
        const target = (mode === "order") ? surahData[currentIdx].words[userSeq.length] : surahData[currentIdx].words[hiddenIdx];
        const bank = document.getElementById('word-bank').children;
        for(let btn of bank) {
            if(btn.innerText === target && btn.style.visibility !== "hidden") {
                btn.classList.add('hint-active');
                setTimeout(() => btn.classList.remove('hint-active'), 2500);
                break;
            }
        }
    }

    async function playAudio() {
        const rid = document.getElementById('reciter-select').value;
        const audio = document.getElementById('quran-audio');
        const vNum = currentIdx + 1;
        
        try {
            const res = await fetch(`https://api.quran.com/api/v4/recitations/${rid}/by_ayah/67:${vNum}`);
            const data = await res.json();
            let url = data.audio_files[0].url;
            audio.src = url.startsWith('http') ? url : `https://verses.quran.com/${url}`;
            audio.play();
        } catch(e) {
            // Fallback to EveryAyah server if API is slow
            audio.src = `https://everyayah.com/data/Minshawi_Teacher_128kbps/067${String(vNum).padStart(3, '0')}.mp3`;
            audio.play();
        }
    }

    function toggleMode() { mode = (mode === "order") ? "missing" : "order"; document.getElementById('mode-label').innerText = (mode === "order") ? "Ordering" : "Missing Word"; loadVerse(); }
    function prevVerse() { if(currentIdx > 0) { currentIdx--; loadVerse(); } }
    function nextVerse() { if(currentIdx < 29) { currentIdx++; loadVerse(); } }

    window.onload = loadVerse;
</script>
</body>
</html>
