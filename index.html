<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk: Precision Scholar</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --hint: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; }
        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        
        /* HINT ANIMATION */
        @keyframes hintShake {
            0%, 100% { transform: translateX(0); background: var(--hint); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .hint-active { animation: hintShake 0.4s ease-in-out 3; border: 2px solid black !important; color: white !important; }

        .drop-zone { min-height: 80px; border: 2px dashed var(--accent); border-radius: 15px; margin: 20px 0; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; border-top: 2px solid #eee; }
        .word { background: var(--accent); color: white; padding: 10px 18px; border-radius: 8px; cursor: pointer; user-select: none; font-size: 1.1rem; border: 2px solid transparent; }
        .word.placed { background: var(--primary); }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button, select { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        .btn-next { background: var(--success); color: white; display: none; width: 100%; padding: 18px; border: none; font-size: 1.2rem; border-radius: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="stats-bar">
        <span>Verse <span id="v-num">1</span>/30</span>
        <span>Score: <span id="score">100</span></span>
    </div>

    <div class="controls">
        <select id="reciter-select">
            <option value="168">Minshawi (Kids Repeating)</option>
            <option value="9">Minshawi (Murattal)</option>
        </select>
        <select id="jump-select" onchange="jumpToVerse(this.value)"></select>
        <button onclick="toggleMode()" style="background: #34495e; color: white;">🔄 Game: <span id="mode-label">Ordering</span></button>
    </div>

    <div id="trans-text" style="color: #7f8c8d; font-style: italic; margin-bottom: 15px;"></div>
    <div class="drop-zone" id="drop-zone"></div>
    <div class="word-bank" id="word-bank"></div>

    <div class="controls">
        <button style="background: #8e44ad; color:white;" onclick="playAudio()">🔊 Listen</button>
        <button style="background: var(--hint); color:white;" onclick="giveHint()">💡 Hint</button>
        <button onclick="prevVerse()">⬅ Prev</button>
        <button onclick="nextVerse()">Next ➡</button>
    </div>

    <button id="next-btn" class="btn-next" onclick="nextVerse()">Mubarak! Next Verse</button>
    <audio id="quran-audio"></audio>
</div>

<script>
    const surahData = [
        { id: 1, words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"], trans: "Blessed is He in whose hand is dominion..." },
        { id: 2, words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan", "wa-huwa", "al-’azīzu", "al-ghafūr"], trans: "He who created death and life to test you..." },
        { id: 3, words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni", "min", "tafāwutin", "farji’i", "al-basara", "hal", "tarā", "min", "futūr"], trans: "Who created seven heavens in layers..." }
    ];

    // Add placeholders for verses 4-30
    for(let i=4; i<=30; i++) surahData.push({id: i, words: ["Verse", i, "Loading"], trans: "Keep practicing Verse "+i});

    let currentIdx = 0, score = 100, userSeq = [], isCorrect = false, mode = "order", hiddenIdx = -1;

    function init() {
        const jump = document.getElementById('jump-select');
        surahData.forEach((v, i) => jump.add(new Option(`Verse ${i+1}`, i)));
        loadVerse();
    }

    function toggleMode() {
        mode = (mode === "order") ? "missing" : "order";
        document.getElementById('mode-label').innerText = (mode === "order") ? "Ordering" : "Missing Word";
        loadVerse();
    }

    function loadVerse() {
        isCorrect = false;
        const verse = surahData[currentIdx];
        document.getElementById('v-num').innerText = currentIdx + 1;
        document.getElementById('jump-select').value = currentIdx;
        document.getElementById('trans-text').innerText = verse.trans;
        document.getElementById('next-btn').style.display = "none";
        userSeq = [];
        if(mode === "missing") hiddenIdx = Math.floor(Math.random() * verse.words.length);
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        const dropEl = document.getElementById('drop-zone'), bankEl = document.getElementById('word-bank'), verse = surahData[currentIdx];
        dropEl.innerHTML = ""; bankEl.innerHTML = "";

        if(mode === "order") {
            userSeq.forEach((w, i) => {
                let d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
                d.onclick = () => { if(!isCorrect) { userSeq.splice(i,1); updateUI(); } };
                dropEl.appendChild(d);
            });
        } else {
            verse.words.forEach((w, i) => {
                let d = document.createElement('div');
                d.className = (i === hiddenIdx && !isCorrect) ? 'word' : 'word placed';
                d.innerText = (i === hiddenIdx && !isCorrect) ? "???" : w;
                if (i === hiddenIdx && !isCorrect) d.style.background = "#ddd";
                dropEl.appendChild(d);
            });
        }

        let sorted = [...verse.words].sort();
        sorted.forEach(w => {
            let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
            if(mode === "order" && userSeq.includes(w)) {
                let countUser = userSeq.filter(x => x === w).length;
                let countVerse = verse.words.filter(x => x === w).length;
                if(countUser >= countVerse) d.style.visibility = "hidden";
            }
            d.onclick = () => handleSelection(w);
            bankEl.appendChild(d);
        });
    }

    function handleSelection(w) {
        if(isCorrect) return;
        const verse = surahData[currentIdx];
        let correct = (mode === "order") ? (w === verse.words[userSeq.length]) : (w === verse.words[hiddenIdx]);

        if(correct) {
            if(mode === "order") {
                userSeq.push(w);
                if(userSeq.length === verse.words.length) isCorrect = true;
            } else { isCorrect = true; }
            score += 5;
        } else { score -= 5; }

        if(isCorrect) document.getElementById('next-btn').style.display = "block";
        updateUI();
    }

    function giveHint() {
        if(isCorrect) return;
        score -= 5;
        const verse = surahData[currentIdx];
        const target = (mode === "order") ? verse.words[userSeq.length] : verse.words[hiddenIdx];
        
        const bankBtns = document.getElementById('word-bank').children;
        for(let btn of bankBtns) {
            if(btn.innerText === target && btn.style.visibility !== "hidden") {
                btn.classList.add('hint-active');
                setTimeout(() => btn.classList.remove('hint-active'), 2000);
                break;
            }
        }
        document.getElementById('score').innerText = score;
    }

    async function playAudio() {
        const rid = document.getElementById('reciter-select').value;
        const vNum = currentIdx + 1;
        const audio = document.getElementById('quran-audio');
        
        // Use Quran.com v4 API
        const res = await fetch(`https://api.quran.com/api/v4/recitations/${rid}/by_ayah/67:${vNum}`);
        const data = await res.json();
        const path = data.audio_files[0].url;
        audio.src = path.startsWith('http') ? path : `https://verses.quran.com/${path}`;
        audio.play().catch(e => alert("Audio loading... please try again in a second."));
    }

    function jumpToVerse(v) { currentIdx = parseInt(v); loadVerse(); }
    function prevVerse() { if(currentIdx > 0) { currentIdx--; loadVerse(); } }
    function nextVerse() { if(currentIdx < surahData.length - 1) { currentIdx++; loadVerse(); } }

    window.onload = init;
</script>
</body>
</html>
