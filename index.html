<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk Quiz - Ultimate Master</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; --error: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; text-align: center; transition: 0.3s; margin: 0; }
        .quiz-container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); position: relative; }
        
        /* Stats & UI Layout */
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; padding: 12px 20px; background: #f0f0f0; border-radius: 10px; font-size: 1.1rem; }
        .drop-zone { min-height: 120px; border: 2px dashed var(--accent); border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; padding: 20px; position: relative; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; min-height: 100px; }
        .word { padding: 12px 18px; border-radius: 8px; background: var(--accent); color: white; cursor: pointer; border: none; font-size: 1.1rem; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .word.placed { background: var(--primary); cursor: default; box-shadow: none; }
        
        .feedback-icon { position: absolute; top: -15px; right: 10px; font-size: 2rem; background: white; border-radius: 50%; padding: 0 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* Zen Mode Logic - Only hides distractions */
        body.zen-mode .zen-hide { display: none !important; }
        
        button, select { padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: 1px solid #ccc; transition: 0.2s; font-size: 1rem; }
        .btn-play { background: #8e44ad; color: white; border: none; }
        .btn-hint { background: var(--error); color: white; border: none; }
        .btn-zen { background: #34495e; color: white; border: none; }
        
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: errorShake 0.3s; }
    </style>
</head>

<div class="quiz-container">

        <span class="zen-hide">Score: <span id="score">100</span></span>
    </div>

    <div style="margin-bottom: 15px;">
        <select id="reciter" class="zen-hide">

            <option value="ALAFASY">Mishary Alafasy</option>
            <option value="HUSARY">Al-Husary (Teacher)</option>
        </select>
        <button class="btn-zen" onclick="toggleZen()">🧘 Toggle Zen Mode</button>
    </div>

    <div class="drop-zone" id="drop-zone">
        <div id="feedback" class="feedback-icon"></div>
    </div>

    <div class="zen-hide" style="font-size: 0.9rem; color: #666; margin: 15px 0;">
        Listened: <strong id="listen-stat">0</strong> times &nbsp;|&nbsp; Hints Used: <strong id="hint-stat">0</strong>
    </div>

    <div class="word-bank" id="word-bank"></div>

    <div id="controls" class="zen-hide" style="margin-top: 25px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;">
        <button class="btn-play" onclick="playAudio()">🔊 PLAY VERSE</button>
        <button class="btn-hint" onclick="useHint()">💡 HINT (-5 pts)</button>
        <button onclick="navVerse(-1)">⬅ Prev Verse</button>
        <button onclick="navVerse(1)">Next Verse ➡</button>
    </div>
</div>
