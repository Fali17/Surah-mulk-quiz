<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk: Scholar Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --hint: #f39c12; --audio: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; color: var(--primary); }
        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 10px 20px; border-radius: 50px; margin-bottom: 15px; font-weight: bold; }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
        select, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        .drop-zone { min-height: 80px; border: 2px dashed var(--accent); border-radius: 12px; margin: 15px 0; padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; padding: 15px; border-top: 1px solid #eee; min-height: 60px; }
        .word { background: var(--accent); color: white; padding: 8px 14px; border-radius: 6px; cursor: pointer; user-select: none; transition: 0.3s; }
        .word.placed { background: var(--primary); }
        .word.hint-active { background: var(--hint) !important; transform: scale(1.2); animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(5px); } 50% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
        .btn-next { background: var(--success); color: white; display: none; width: 100%; padding: 15px; border: none; font-size: 1.1rem; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="stats-bar">
        <span>Verse <span id="v-num">1</span>/30</span>
        <span>Score: <span id="score">100</span></span>
    </div>

    <div class="controls">
        <select id="reciter-select">
            <optgroup label="Teacher Style (Repeat)">
                <option value="Minshawi_Teacher_128kbps">Minshawi with Kids (Teacher)</option>
                <option value="Husary_Muallim_128kbps">Al-Husary (Teacher)</option>
            </optgroup>
            <optgroup label="Quran.com / Murattal">
                <option value="7">Mishary Rashid Alafasy</option>
                <option value="168">Minshawi (Murattal)</option>
                <option value="12">Al-Husary (Murattal)</option>
                <option value="1">Abdul Basit (Mujawwad)</option>
                <option value="13">Ali Al-Huthaify</option>
                <option value="10">Saud al-Shuraim</option>
                <option value="3">Abdur-Rahman as-Sudais</option>
            </optgroup>
        </select>
        <select id="jump-select" onchange="jumpToVerse(this.value)"></select>
    </div>

    <div id="trans-text" style="color: #7f8c8d; font-style: italic; margin-bottom: 10px;"></div>
    <div class="drop-zone" id="drop-zone"></div>
    <div class="word-bank" id="word-bank"></div>
    <div id="status-msg" style="margin:10px; font-weight:bold;"></div>

    <div class="controls">
        <button style="background: var(--audio); color:white;" onclick="playAudio()">🔊 Listen</button>
        <button style="background: var(--hint); color:white;" onclick="giveHint()">💡 Hint</button>
        <button onclick="toggleMode()">🔄 Change Mode</button>
        <button onclick="prevVerse()">⬅ Prev</button>
        <button onclick="nextVerse()">Next ➡</button>
    </div>

    <button id="next-btn" class="btn-next" onclick="nextVerse()">Mubarak! Next Verse</button>
    <audio id="quran-audio"></audio>
</div>

<script>
    const surahData = [
        { id: 1, words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"], trans: "Blessed is He in whose hand is dominion..." },
        { id: 2, words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan", "wa-huwa", "al-’azīzu", "al-ghafūr"], trans: "He who created death and life to test you..." },
        { id: 3, words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni", "min", "tafāwutin", "farji’i", "al-basara", "hal", "tarā", "min", "futūr"], trans: "Who created seven heavens in layers..." }
    ];

    for(let i=4; i<=30; i++) { surahData.push({id:i, words:["Verse", "Content", "Loading"], trans: "Loading next verse..."}); }

    let currentIdx = 0, score = 100, userSeq = [], isCorrect = false, mode = 'order', hiddenIdx = -1;

    function init() {
        const jump = document.getElementById('jump-select');
        jump.innerHTML = "";
        surahData.forEach((v, i) => jump.add(new Option(`Verse ${i+1}`, i)));
        loadVerse();
    }

    function toggleMode() {
        mode = (mode === 'order') ? 'missing' : 'order';
        loadVerse();
        alert("Mode switched to: " + (mode === 'order' ? "Word Ordering" : "Missing Word"));
    }

    function loadVerse() {
        isCorrect = false;
        const verse = surahData[currentIdx];
        document.getElementById('v-num').innerText = currentIdx + 1;
        document.getElementById('jump-select').value = currentIdx;
        document.getElementById('trans-text').innerText = verse.trans;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('drop-zone').classList.remove('correct-state');
        userSeq = [];
        hiddenIdx = (mode === 'missing') ? Math.floor(Math.random() * verse.words.length) : -1;
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        const dropEl = document.getElementById('drop-zone'), bankEl = document.getElementById('word-bank'), verse = surahData[currentIdx];
        dropEl.innerHTML = ""; bankEl.innerHTML = "";

        if (mode === 'order') {
            userSeq.forEach((w, i) => {
                let d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
                d.onclick = () => { if(!isCorrect) { userSeq.splice(i,1); updateUI(); } };
                dropEl.appendChild(d);
            });
        } else {
            verse.words.forEach((w, i) => {
                let d = document.createElement('div');
                d.className = (i === hiddenIdx && userSeq.length === 0) ? 'word blank' : 'word placed';
                d.innerText = (i === hiddenIdx && userSeq.length === 0) ? "???" : (i === hiddenIdx ? userSeq[0] : w);
                dropEl.appendChild(d);
            });
        }

        let sortedBank = [...verse.words].sort();
        let tempUser = [...userSeq];
        sortedBank.forEach(w => {
            let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
            if (mode === 'order' && tempUser.includes(w)) {
                d.style.visibility = "hidden";
                tempUser.splice(tempUser.indexOf(w), 1);
            } else if (mode === 'missing' && userSeq.length > 0) {
                d.style.opacity = "0.5";
            } else {
                d.onclick = () => handleSelection(w);
            }
            bankEl.appendChild(d);
        });
    }

    function handleSelection(w) {
        if(isCorrect) return;
        const verse = surahData[currentIdx];
        let correct = (mode === 'order') ? (w === verse.words[userSeq.length]) : (w === verse.words[hiddenIdx]);

        if (correct) {
            userSeq.push(w);
            score += 5;
        } else {
            score -= 5;
        }
        
        if ((mode === 'order' && userSeq.length === verse.words.length) || (mode === 'missing' && correct)) {
            isCorrect = true;
            document.getElementById('next-btn').style.display = "block";
        }
        updateUI();
    }

    async function playAudio() {
        const val = document.getElementById('reciter-select').value;
        const vNum = currentIdx + 1;
        const audio = document.getElementById('quran-audio');
        
        if (isNaN(val)) {
            // Teacher Style
            audio.src = `https://everyayah.com/data/${val}/067${String(vNum).padStart(3, '0')}.mp3`;
        } else {
            // Quran.com Style
            const res = await fetch(`https://api.quran.com/api/v4/recitations/${val}/by_ayah/67:${vNum}`);
            const data = await res.json();
            audio.src = data.audio_files[0].url.startsWith('http') ? data.audio_files[0].url : `https://verses.quran.com/${data.audio_files[0].url}`;
        }
        audio.play();
        score -= 5;
        updateUI();
    }

    function giveHint() {
        if(isCorrect) return;
        score -= 5;
        const target = (mode === 'order') ? surahData[currentIdx].words[userSeq.length] : surahData[currentIdx].words[hiddenIdx];
        
        const bank = document.getElementById('word-bank').children;
        for (let btn of bank) {
            if (btn.innerText === target && btn.style.visibility !== "hidden") {
                btn.classList.add('hint-active');
                setTimeout(() => btn.classList.remove('hint-active'), 2000);
                break;
            }
        }
        updateUI();
    }

    function jumpToVerse(val) { currentIdx = parseInt(val); loadVerse(); }
    function prevVerse() { if(currentIdx > 0) { currentIdx--; loadVerse(); } }
    function nextVerse() { if(currentIdx < 29) { currentIdx++; loadVerse(); } }

    window.onload = init;
</script>
</body>
</html>
