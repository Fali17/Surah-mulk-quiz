<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk: Pro Scholar Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --hint: #f39c12; --audio: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; color: var(--primary); }
        .quiz-card { background: white; width: 100%; max-width: 750px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 10px 20px; border-radius: 50px; margin-bottom: 15px; font-weight: bold; }
        .points-text { color: var(--success); }
        .translation { font-style: italic; color: #7f8c8d; margin: 10px 0; font-size: 0.95rem; line-height: 1.4; }
        .drop-zone { min-height: 80px; border: 2px dashed var(--accent); border-radius: 12px; margin: 15px 0; padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; padding: 15px; border-top: 1px solid #eee; }
        .word { background: var(--accent); color: white; padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .word.placed { background: var(--primary); }
        .status-msg { margin-top: 15px; font-weight: bold; min-height: 1.5em; }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
        select, button { padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        .btn-next { background: var(--success); color: white; display: none; width: 100%; margin-top: 10px; padding: 15px; }
        .nav-btn { background: #95a5a6; color: white; }
        .correct-state { border-color: var(--success) !important; background: #f0fff4 !important; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="stats-bar">
        <span>Verse <span id="v-num">1</span>/30</span>
        <span class="points-text">Score: <span id="score">100</span></span>
    </div>

    <div class="controls">
        <select id="reciter-select">
            <option value="2">Abdul Basit (Murattal)</option>
            <option value="1">Abdul Basit (Mujawwad)</option>
            <option value="7">Mishary Rashid Alafasy</option>
            <option value="3">Abdur-Rahman as-Sudais</option>
            <option value="4">Abu Bakr al-Shatri</option>
            <option value="5">Hani ar-Rifa'i</option>
            <option value="12">Mahmoud Khalil Al-Husary</option>
        </select>
        <select id="jump-select" onchange="jumpToVerse(this.value)">
            </select>
    </div>

    <div class="translation" id="trans-text"></div>
    <div class="drop-zone" id="drop-zone"></div>
    <div class="word-bank" id="word-bank"></div>
    <div id="status-msg" class="status-msg"></div>

    <div class="controls">
        <button style="background: var(--audio); color:white;" onclick="playRecitation()">🔊 Listen (-5 pts)</button>
        <button style="background: var(--hint); color:white;" onclick="giveHint()">💡 Hint (-5 pts)</button>
        <button onclick="toggleMode()">🔄 Toggle Mode</button>
        <button class="nav-btn" onclick="prevVerse()">⬅ Prev</button>
        <button class="nav-btn" onclick="nextVerse()">Next ➡</button>
    </div>

    <button id="next-btn" class="btn-next" onclick="nextVerse()">Great! Move to Next Verse</button>
    <audio id="quran-audio"></audio>
</div>

<script>
    const surahData = [
        { id: 1, words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"], trans: "Blessed is He in whose hand is dominion, and He is over all things competent." },
        { id: 2, words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan", "wa-huwa", "al-’azīzu", "al-ghafūr"], trans: "[He] who created death and life to test you [as to] which of you is best in deed - and He is the Exalted in Might, the Forgiving." },
        { id: 3, words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni", "min", "tafāwutin", "farji’i", "al-basara", "hal", "tarā", "min", "futūr"], trans: "[And] who created seven heavens in layers. You do not see in the creation of the Most Merciful any inconsistency..." },
        { id: 4, words: ["thumma", "arji’i", "al-basara", "karratayni", "yanqalib", "ilayka", "al-basaru", "khāsi’an", "wa-huwa", "hasīr"], trans: "Then return [your] vision twice again. [Your] vision will return to you humbled while it is fatigued." },
        { id: 5, words: ["wa-laqad", "zayyannā", "as-samā’a", "ad-dunyā", "bi-masābīha", "wa-ja’alnāhā", "rujūman", "lish-shayātīni", "wa-’atadnā", "lahum", "’adhāba", "as-sa’īr"], trans: "And We have certainly beautified the nearest heaven with stars and have made [from] them projectiles to drive away devils..." },
        { id: 6, words: ["wa-lilladhīna", "kafarū", "bi-rabbihim", "’adhābu", "jahannama", "wa-bi’sa", "al-masīr"], trans: "And for those who have disbelieved in their Lord is the punishment of Hell, and wretched is the destination." },
        { id: 7, words: ["idhā", "ulqū", "fīhā", "sami’ū", "lahā", "shahīqan", "wa-hiya", "tafūr"], trans: "When they are thrown into it, they hear from it a [dreadful] inhaling while it boils up." },
        { id: 8, words: ["takādu", "tamayyazu", "mina", "al-ghayzi", "kullamā", "ulqiya", "fīhā", "fawjun", "sa’alahum", "khazanatuhā", "alam", "ya’tikum", "nadhīr"], trans: "It almost bursts with rage. Every time a company is thrown into it, its keepers ask them, 'Did there not come to you a warner?'" },
        { id: 9, words: ["qālū", "balā", "qad", "jā’anā", "nadhīrun", "fa-kadh-dhabnā", "wa-qulnā", "mā", "nazzala", "Allāhu", "min", "shay’in", "in", "antum", "illā", "fī", "dalālin", "kabīr"], trans: "They will say, 'Yes, a warner had come to us, but we denied and said, \"Allah has not sent down anything...\"'" },
        { id: 10, words: ["wa-qālū", "law", "kunnā", "nasma’u", "aw", "na’qilu", "mā", "kunnā", "fī", "ashābi", "as-sa’īr"], trans: "And they will say, 'If only we had been listening or reasoning, we would not be among the companions of the Blaze.'" },
        { id: 11, words: ["fa-’tarafū", "bi-dhambihim", "fa-suhqan", "li-ashābi", "as-sa’īr"], trans: "And they will admit their sin, so [it is] alienation for the companions of the Blaze." },
        { id: 12, words: ["inna", "alladhīna", "yakhshowna", "rabbahum", "bi-l-ghaybi", "lahum", "maghfiratun", "wa-ajrun", "kabīr"], trans: "Indeed, those who fear their Lord unseen will have forgiveness and great reward." },
        { id: 13, words: ["wa-asirrū", "qawlakum", "awi", "ijharū", "bihi", "innahu", "’alīmun", "bi-dhāti", "as-sudūr"], trans: "And conceal your speech or publicize it; indeed, He is Knowing of that within the breasts." },
        { id: 14, words: ["alā", "ya’lamu", "man", "khalaqa", "wa-huwa", "al-latīfu", "al-khabīr"], trans: "Does He who created not know, while He is the Subtle, the Acquainted?" },
        { id: 15, words: ["huwa", "alladhī", "ja’ala", "lakumu", "al-arda", "dhalūlan", "fa-mshū", "fī", "manākibihā", "wa-kulū", "min", "rizqihi", "wa-ilayhi", "an-nushūr"], trans: "It is He who made the earth tame for you - so walk among its slopes and eat of His provision - and to Him is the resurrection." },
        { id: 16, words: ["a-amintum", "man", "fī", "as-samā’i", "an", "yakhsifa", "bikumu", "al-arda", "fa-idhā", "hiya", "tamūr"], trans: "Do you feel secure that He who [holds authority] in the heaven would not cause the earth to swallow you and suddenly it would sway?" },
        { id: 17, words: ["am", "amintum", "man", "fī", "as-samā’i", "an", "yursila", "’alaykum", "hāsiban", "fa-sata’lamūna", "kayfa", "nadhīr"], trans: "Or do you feel secure that He who [holds authority] in the heaven would not send against you a storm of stones? Then you would know how [severe] was My warning." },
        { id: 18, words: ["wa-laqad", "kadh-dhaba", "alladhīna", "min", "qablihim", "fa-kayfa", "kāna", "nakīr"], trans: "And already had those before them denied, and how [terrible] was My reproach." },
        { id: 19, words: ["awalam", "yaraw", "ilā", "at-tayri", "fawqahum", "sāffātin", "wa-yaqbidna", "mā", "yumsikuhunna", "illā", "ar-rahmānu", "innahu", "bi-kulli", "shay’in", "basīr"], trans: "Do they not see at the birds above them with wings outspread and [sometimes] folded in? None holds them up except the Most Merciful..." },
        { id: 20, words: ["am-man", "hādhā", "alladhī", "huwa", "jundun", "lakum", "yansurukum", "min", "dūni", "ar-rahmāni", "ini", "al-kāfirūna", "illā", "fī", "ghurūr"], trans: "Or who is it that could be an army for you to aid you other than the Most Merciful? The disbelievers are not but in delusion." },
        { id: 21, words: ["am-man", "hādhā", "alladhī", "yarzuqukum", "in", "amsaka", "rizqahu", "bal", "lajjū", "fī", "’utuwwin", "wa-nufūr"], trans: "Or who is it that could provide for you if He withheld His provision? But they have persisted in insolence and aversion." },
        { id: 22, words: ["afa-man", "yamshī", "mukibban", "’alā", "wajhihi", "ahdā", "am-man", "yamshī", "sawiyyan", "’alā", "sirātin", "mustaqīm"], trans: "Then is one who walks fallen on his face better guided or one who walks erect on a straight path?" },
        { id: 23, words: ["qul", "huwa", "alladhī", "ansha’akum", "wa-ja’ala", "lakumu", "as-sam’a", "wa-l-absāra", "wa-l-af’idata", "qalīlan", "mā", "tashkurūn"], trans: "Say, 'It is He who has produced you and made for you hearing and vision and hearts; little are you grateful.'" },
        { id: 24, words: ["qul", "huwa", "alladhī", "dhara’akum", "fī", "al-ardi", "wa-ilayhi", "tuhsharūn"], trans: "Say, 'It is He who has multiplied you throughout the earth, and to Him you will be gathered.'" },
        { id: 25, words: ["wa-yaqūlūna", "matā", "hādhā", "al-wa’du", "in", "kuntum", "sādiqīn"], trans: "And they say, 'When is this promise, if you should be truthful?'" },
        { id: 26, words: ["qul", "innamā", "al-’ilmu", "’inda", "Allāhi", "wa-innamā", "ana", "nadhīrun", "mubīn"], trans: "Say, 'The knowledge is only with Allah, and I am only a clear warner.'" },
        { id: 27, words: ["fa-lammā", "ra’awhu", "zulfatan", "sī’at", "wujūhu", "alladhīna", "kafarū", "wa-qīla", "hādhā", "alladhī", "kuntum", "bihi", "tadda’ūn"], trans: "But when they see it approaching, the faces of those who disbelieve will be distressed, and it will be said, 'This is that which you used to call for.'" },
        { id: 28, words: ["qul", "ara’aytum", "in", "ahlakaniya", "Allāhu", "wa-man", "ma’iya", "aw", "rahimanā", "fa-man", "yujīru", "al-kāfirīna", "min", "’adhābin", "alīm"], trans: "Say, [O Muhammad], 'Have you considered: whether Allah should cause my death and those with me or have mercy upon us, who can protect the disbelievers from a painful punishment?'" },
        { id: 29, words: ["qul", "huwa", "ar-rahmānu", "āmannā", "bihi", "wa-’alayhi", "tawakkalnā", "fa-sata’lamūna", "man", "huwa", "fī", "dalālin", "mubīn"], trans: "Say, 'He is the Most Merciful; we have believed in Him, and upon Him we have relied. And you will [come to] know who it is that is in clear error.'" },
        { id: 30, words: ["qul", "ara’aytum", "in", "asbaha", "mā’ukum", "ghawran", "fa-man", "ya’tīkum", "bi-mā’in", "ma’īn"], trans: "Say, 'Have you considered: if your water was to become sunken [into the earth], then who could bring you flowing water?'" }
    ];

    let currentIdx = 0;
    let score = 100;
    let mode = 'order';
    let userSeq = [];
    let bank = [];
    let listenCount = 0;
    let totalListenCount = 0;
    let hiddenIdx = -1;

    function init() {
        const jump = document.getElementById('jump-select');
        if(jump.options.length === 0) {
            surahData.forEach((v, i) => {
                let opt = new Option(`Verse ${i+1}`, i);
                jump.add(opt);
            });
        }
        loadVerse();
    }

    function loadVerse() {
        const verse = surahData[currentIdx];
        document.getElementById('v-num').innerText = currentIdx + 1;
        document.getElementById('jump-select').value = currentIdx;
        document.getElementById('trans-text').innerText = verse.trans;
        document.getElementById('status-msg').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('drop-zone').classList.remove('correct-state');
        
        userSeq = [];
        listenCount = 0;
        bank = [...verse.words].sort(() => Math.random() - 0.5);
        hiddenIdx = (mode === 'fill') ? Math.floor(Math.random() * verse.words.length) : -1;
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        if(score <= 0) {
            alert("GAME OVER! Starting from Verse 1.");
            score = 100; currentIdx = 0; loadVerse();
            return;
        }

        const dropEl = document.getElementById('drop-zone');
        const bankEl = document.getElementById('word-bank');
        dropEl.innerHTML = ""; bankEl.innerHTML = "";
        const verse = surahData[currentIdx];

        if(mode === 'order') {
            userSeq.forEach((w, i) => {
                let d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
                d.onclick = () => { userSeq.splice(i,1); updateUI(); };
                dropEl.appendChild(d);
            });
            let temp = [...userSeq];
            bank.forEach(w => {
                let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
                let idx = temp.indexOf(w);
                if(idx > -1) { d.style.visibility = "hidden"; temp.splice(idx,1); }
                else { d.onclick = () => { 
                    userSeq.push(w); 
                    if(w === verse.words[userSeq.length-1]) {
                        score += 5; 
                        document.getElementById('status-msg').innerText = "✅ Word Correct! +5 pts";
                    }
                    updateUI(); 
                }; }
                bankEl.appendChild(d);
            });
        } else {
            verse.words.forEach((w, i) => {
                let d = document.createElement('div');
                if(i === hiddenIdx && userSeq.length === 0) { d.className = 'word blank-space'; d.innerText = "___"; }
                else { 
                    d.className = 'word placed'; 
                    d.innerText = (i === hiddenIdx) ? userSeq[0] : w;
                    if(i === hiddenIdx) d.onclick = () => { userSeq = []; updateUI(); };
                }
                dropEl.appendChild(d);
            });
            bank.forEach(w => {
                let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
                d.onclick = () => { userSeq = [w]; if(w === verse.words[hiddenIdx]) score += 5; updateUI(); };
                if(userSeq.includes(w)) d.style.opacity = "0.3";
                bankEl.appendChild(d);
            });
        }

        if(userSeq.length === (mode === 'order' ? verse.words.length : 1)) checkAnswer();
    }

    async function playRecitation() {
        const rId = document.getElementById('reciter-select').value;
        const vNum = currentIdx + 1;
        score -= 5; listenCount++; totalListenCount++;
        updateUI();

        try {
            const res = await fetch(`https://api.quran.com/api/v4/recitations/${rId}/by_ayah/67:${vNum}`);
            const data = await res.json();
            const audio = document.getElementById('quran-audio');
            audio.src = data.audio_files[0].url.startsWith('http') ? data.audio_files[0].url : `https://verses.quran.com/${data.audio_files[0].url}`;
            audio.play();
        } catch(e) { alert("Audio error"); }
    }

    function giveHint() {
        score -= 5;
        const verse = surahData[currentIdx];
        let target = (mode === 'order') ? verse.words[userSeq.length] : verse.words[hiddenIdx];
        const btns = document.querySelectorAll('#word-bank .word');
        btns.forEach(b => {
            if(b.innerText === target && b.style.visibility !== "hidden") {
                b.style.background = "var(--hint)";
                setTimeout(() => b.style.background = "var(--accent)", 1000);
            }
        });
        updateUI();
    }

    function checkAnswer() {
        const verse = surahData[currentIdx];
        let win = (mode === 'order') ? JSON.stringify(userSeq) === JSON.stringify(verse.words) : userSeq[0] === verse.words[hiddenIdx];
        if(win) {
            score += 10;
            document.getElementById('status-msg').innerHTML = `✨ Verse Mastered! +10 pts<br>You listened to this verse ${listenCount} times.`;
            document.getElementById('drop-zone').classList.add('correct-state');
            document.getElementById('next-btn').style.display = "block";
            document.getElementById('score').innerText = score;
        } else {
            document.getElementById('status-msg').innerText = "❌ Order incorrect. Tap to fix.";
        }
    }

    function jumpToVerse(val) { currentIdx = parseInt(val); loadVerse(); }
    function toggleMode() { mode = (mode === 'order') ? 'fill' : 'order'; loadVerse(); }
    function prevVerse() { if(currentIdx > 0) { currentIdx--; loadVerse(); } }
    function nextVerse() {
        if(currentIdx < 29) { currentIdx++; loadVerse(); }
        else { 
            alert(`MUBARAK! You finished the Surah.\nTotal Recitations: ${totalListenCount}\nFinal Score: ${score}`);
            currentIdx = 0; loadVerse(); 
        }
    }

    window.onload = init;
</script>
</body>
</html>
