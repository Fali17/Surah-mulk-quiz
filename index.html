<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk: Full 30 Verses</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --hint-color: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; }
        .quiz-card { background: white; width: 100%; max-width: 850px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .drop-zone { min-height: 90px; border: 2px dashed var(--accent); border-radius: 15px; margin: 20px 0; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; border-top: 2px solid #eee; }
        .word { background: var(--accent); color: white; padding: 12px 18px; border-radius: 10px; cursor: pointer; user-select: none; font-size: 1.1rem; transition: 0.2s; }
        .word.placed { background: var(--primary); }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button, select { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        .hint-active { animation: shake 0.3s infinite; background: red !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="stats-bar">
        <span>Surah Al-Mulk: Verse <span id="v-num">1</span>/30</span>
        <span id="score-wrapper">Score: <span id="score">100</span></span>
    </div>

    <div class="controls">
        <select id="reciter-select">
            <option value="KIDS">Minshawi (Kids - Auto-Stop)</option>
            <option value="9">Minshawi (Solo - Quran.com)</option>
            <option value="8">Mishary Alafasy</option>
        </select>
        <button onclick="toggleMode()" style="background: #34495e; color: white;">Switch Mode</button>
    </div>

    <div class="drop-zone" id="drop-zone"></div>
    <div class="word-bank" id="word-bank"></div>

    <div class="controls">
        <button style="background: #8e44ad; color:white;" onclick="playAudio()">🔊 PLAY VERSE</button>
        <button style="background: var(--hint-color); color:white;" onclick="giveHint()">💡 HINT</button>
        <button onclick="changeVerse(-1)">⬅ Prev</button>
        <button onclick="changeVerse(1)">Next ➡</button>
    </div>

    <audio id="audio-player"></audio>
</div>

<script>
    // Precision timestamps for Surah 67 (from your segments.json)
    const timestamps = {
        1: [0, 10500], 2: [10500, 24500], 3: [24500, 47500], 4: [47500, 62000], 5: [62000, 88000],
        6: [88000, 101000], 7: [101000, 125000], 8: [125000, 148000], 9: [148000, 175000], 10: [175000, 190000],
        11: [190000, 202000], 12: [202000, 218000], 13: [218000, 230000], 14: [230000, 245000], 15: [245000, 268000],
        16: [268000, 282000], 17: [282000, 300000], 18: [300000, 312000], 19: [312000, 335000], 20: [335000, 355000],
        21: [355000, 375000], 22: [375000, 395000], 23: [395000, 412000], 24: [412000, 425000], 25: [425000, 438000],
        26: [438000, 452000], 27: [452000, 475000], 28: [475000, 495000], 29: [495000, 510000], 30: [510000, 535000]
    };

    const surahData = [
        { words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"] },
        { words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan", "wa-huwa", "al-’azīzu", "al-ghafūr"] },
        { words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni", "min", "tafāwutin", "farji’i", "al-basara", "hal", "tarā", "min", "futūr"] },
        { words: ["thumma", "arji’i", "al-basara", "karratayn", "yanqalib", "ilayka", "al-basaru", "khāsi’an", "wa-huwa", "hasīr"] },
        { words: ["wa-laqad", "zayyannā", "as-samā’a", "ad-dunyā", "bi-masābīha", "wa-ja’alnāhā", "rujūman", "lish-shayātīni", "wa-a’tadnā", "lahum", "’adhāba", "as-sa’īr"] },
        { words: ["wa-lilladhīna", "kafarū", "bi-rabbihim", "’adhābu", "jahannama", "wa-bi’sa", "al-masīr"] },
        { words: ["idhā", "ulqū", "fīhā", "sami’ū", "lahā", "shahīqan", "wa-hiya", "tafūr"] },
        { words: ["takādu", "tamayyazu", "mina", "al-ghayzi", "kullamā", "ulqiya", "fīhā", "fawjun", "sa’alahum", "khazanatuhā", "alam", "ya’tikum", "nadhīr"] },
        { words: ["qālū", "balā", "qad", "jā’anā", "nadhīrun", "fa-kadh-dhabnā", "wa-qulnā", "mā", "nazzala", "Allāhu", "min", "shay’in", "in", "antum", "illā", "fī", "dalālin", "kabīr"] },
        { words: ["wa-qālū", "law", "kunnā", "nasma’u", "aw", "na’qilu", "mā", "kunnā", "fī", "ashābi", "as-sa’īr"] },
        { words: ["fa-’tarafū", "bi-dhanbihim", "fa-suhqan", "li-ashābi", "as-sa’īr"] },
        { words: ["inna", "alladhīna", "yakhshawna", "rabbahum", "bi-l-ghaybi", "lahum", "maghfiratun", "wa-ajrun", "kabīr"] },
        { words: ["wa-asirrū", "qawlakum", "awi", "ijharū", "bihi", "innahu", "’alīmun", "bi-dhāti", "as-sudūr"] },
        { words: ["alā", "ya’lamu", "man", "khalaqa", "wa-huwa", "al-latīfu", "al-khabīr"] },
        { words: ["huwa", "alladhī", "ja’ala", "lakumu", "al-arda", "dhalūlan", "fa-mshū", "fī", "manākibihā", "wa-kulū", "min", "rizqihi", "wa-ilayhi", "an-nushūr"] },
        { words: ["a-amintum", "man", "fī", "as-samā’i", "an", "yakhsifa", "bikumu", "al-arda", "fa-idhā", "hiya", "tamūr"] },
        { words: ["am", "amintum", "man", "fī", "as-samā’i", "an", "yursila", "’alaykum", "hāsiban", "fa-sata’lamūna", "kayfa", "nadhīr"] },
        { words: ["wa-laqad", "kadh-dhaba", "alladhīna", "min", "qablihim", "fa-kayfa", "kāna", "nakīr"] },
        { words: ["a-wa-lam", "yaraw", "ilā", "at-tayri", "fawqahum", "sāffātin", "wa-yaqbidna", "mā", "yumsikuhunna", "illā", "ar-rahmānu", "innahu", "bi-kulli", "shay’in", "basīr"] },
        { words: ["am-man", "hādha", "alladhī", "huwa", "jundun", "lakum", "yansurukum", "min", "dūni", "ar-rahmāni", "ini", "al-kāfirūna", "illā", "fī", "ghurūr"] },
        { words: ["am-man", "hādha", "alladhī", "yarzuqukum", "in", "amsaka", "rizqahu", "bal", "lajjū", "fī", "’utuwwin", "wa-nufūr"] },
        { words: ["a-fa-man", "yamshī", "mukibban", "’alā", "wajhihi", "ahdā", "am-man", "yamshī", "sawiyyan", "’alā", "sirātin", "mustaqīm"] },
        { words: ["qul", "huwa", "alladhī", "ansha’akum", "wa-ja’ala", "lakumu", "as-sam’a", "wa-l-absāra", "wa-l-af’idata", "qalīlan", "mā", "tashkurūn"] },
        { words: ["qul", "huwa", "alladhī", "dhara’akum", "fī", "al-ardi", "wa-ilayhi", "tuhsharūn"] },
        { words: ["wa-yaqūlūna", "matā", "hādha", "al-wa’du", "in", "kuntum", "sādiqīn"] },
        { words: ["qul", "innamā", "al-’ilmu", "’inda", "Allāhi", "wa-innamā", "ana", "nadhīrun", "mubīn"] },
        { words: ["fa-lammā", "ra’awhu", "zulfatan", "sī’at", "wujūhu", "alladhīna", "kafarū", "wa-qīla", "hādha", "alladhī", "kuntum", "bihi", "tadda’ūn"] },
        { words: ["qul", "ara’aytum", "in", "ahlakaniya", "Allāhu", "wa-man", "ma’iya", "aw", "rahimanā", "fa-man", "yujīru", "al-kāfirīna", "min", "’adhābin", "alīm"] },
        { words: ["qul", "huwa", "ar-rahmānu", "āmannā", "bihi", "wa-’alayhi", "tawakkalnā", "fa-sata’lamūna", "man", "huwa", "fī", "dalālin", "mubīn"] },
        { words: ["qul", "ara’aytum", "in", "asbaha", "mā’ukum", "ghawran", "fa-man", "ya’tīkum", "bi-mā’in", "ma’īn"] }
    ];

    let currentIdx = 0, score = 100, userSeq = [], isCorrect = false, mode = "order", stopTimer;
    const audio = document.getElementById('audio-player');

    function loadVerse() {
        isCorrect = false; userSeq = [];
        document.getElementById('v-num').innerText = currentIdx + 1;
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        const dropEl = document.getElementById('drop-zone'), bankEl = document.getElementById('word-bank'), v = surahData[currentIdx];
        dropEl.innerHTML = ""; bankEl.innerHTML = "";

        userSeq.forEach((w, i) => {
            let d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
            d.onclick = () => { if(!isCorrect) { userSeq.splice(i,1); updateUI(); } };
            dropEl.appendChild(d);
        });

        [...v.words].sort().forEach(w => {
            let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
            if(userSeq.filter(x => x === w).length >= v.words.filter(x => x === w).length) d.style.visibility = "hidden";
            d.onclick = () => handleSelection(w);
            bankEl.appendChild(d);
        });
    }

    async function playAudio() {
        clearInterval(stopTimer);
        const type = document.getElementById('reciter-select').value;
        const vNum = currentIdx + 1;

        if (type === "KIDS") {
            const range = timestamps[vNum];
            audio.src = `https://download.quranicaudio.com/qdc/siddiq_minshawi/kids_repeat/67.mp3`;
            audio.currentTime = range[0] / 1000;
            audio.play();
            stopTimer = setInterval(() => { if (audio.currentTime >= range[1] / 1000) audio.pause(); }, 10);
        } else {
            const res = await fetch(`https://api.quran.com/api/v4/recitations/${type}/by_ayah/67:${vNum}`);
            const data = await res.json();
            audio.src = data.audio_files[0].url.startsWith('http') ? data.audio_files[0].url : `https://verses.quran.com/${data.audio_files[0].url}`;
            audio.play();
        }
    }

    function handleSelection(w) {
        if(isCorrect) return;
        if(w === surahData[currentIdx].words[userSeq.length]) {
            userSeq.push(w); score += 5;
            if(userSeq.length === surahData[currentIdx].words.length) isCorrect = true;
        } else { score -= 5; }
        updateUI();
    }

    function changeVerse(dir) {
        currentIdx = Math.max(0, Math.min(surahData.length - 1, currentIdx + dir));
        loadVerse();
    }

    window.onload = loadVerse;
</script>
</body>
</html>
