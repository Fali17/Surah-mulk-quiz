<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surah Al-Mulk: Scholar Edition</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; --hint: #f39c12; --audio: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; color: var(--primary); }
        .quiz-card { background: white; width: 100%; max-width: 800px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; background: #eee; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        /* THE HINT FIX */
        @keyframes shake-hint {
            0% { transform: translateX(0); background-color: var(--hint); }
            25% { transform: translateX(8px); }
            50% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
            100% { transform: translateX(0); background-color: var(--hint); }
        }
        .hint-active { 
            animation: shake-hint 0.4s ease-in-out 3; 
            border: 3px solid #000 !important;
            z-index: 100;
        }

        .drop-zone { min-height: 100px; border: 2px dashed var(--accent); border-radius: 15px; margin: 20px 0; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: #fafafa; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 20px; border-top: 2px solid #eee; min-height: 80px; }
        .word { background: var(--accent); color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; user-select: none; font-size: 1rem; position: relative; }
        .word.placed { background: var(--primary); }
        .status-msg { margin: 15px 0; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
        .btn-next { background: var(--success); color: white; display: none; width: 100%; padding: 18px; border: none; font-size: 1.2rem; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="stats-bar">
        <span>Verse <span id="v-num">1</span>/30</span>
        <span>Score: <span id="score">100</span></span>
    </div>

    <div class="controls">
        <select id="reciter-select">
            <optgroup label="Your Requested Options">
                <option value="168">Minshawi (Mujawwad - From your Link)</option>
                <option value="Minshawi_Teacher_128kbps">Minshawi (Kids/Teacher Style)</option>
            </optgroup>
            <optgroup label="Al-Husary Options">
                <option value="12">Husary (Murattal)</option>
                <option value="Husary_Muallim_128kbps">Husary (Teacher/Kids Style)</option>
            </optgroup>
            <optgroup label="Other Reciters">
                <option value="7">Mishary Rashid Alafasy</option>
                <option value="13">Ali Al-Huthaify</option>
            </optgroup>
        </select>
        <select id="jump-select" onchange="jumpToVerse(this.value)"></select>
    </div>

    <div id="trans-text" style="color: #7f8c8d; font-style: italic; margin-bottom: 15px;"></div>
    <div class="drop-zone" id="drop-zone"></div>
    <div class="word-bank" id="word-bank"></div>
    <div id="status-msg" class="status-msg"></div>

    <div class="controls">
        <button style="background: var(--audio); color:white;" onclick="playAudio()">🔊 Listen</button>
        <button style="background: var(--hint); color:white;" onclick="giveHint()">💡 Hint</button>
        <button onclick="prevVerse()">⬅ Prev</button>
        <button onclick="nextVerse()">Next ➡</button>
    </div>

    <button id="next-btn" class="btn-next" onclick="nextVerse()">Mubarak! Next Verse</button>
    <audio id="quran-audio"></audio>
</div>

<script>
    const surahData = [
        { id: 1, words: ["Tabāraka", "alladhī", "bi-yadihi", "al-mulku", "wa-huwa", "’alā", "kulli", "shay’in", "qadīr"], trans: "Blessed is He in whose hand is dominion..." },
        { id: 2, words: ["alladhī", "khalaqa", "al-mawta", "wa-l-hayāta", "li-yabluwakum", "ayyukum", "ahsanu", "’amalan", "wa-huwa", "al-’azīzu", "al-ghafūr"], trans: "He who created death and life to test you..." },
        { id: 3, words: ["alladhī", "khalaqa", "sab’a", "samāwātin", "tibāqan", "mā", "tarā", "fī", "khalqi", "ar-rahmāni", "min", "tafāwutin", "farji’i", "al-basara", "hal", "tarā", "min", "futūr"], trans: "Who created seven heavens in layers..." }
    ];

    let currentIdx = 0, score = 100, userSeq = [], isCorrect = false;

    function init() {
        const jump = document.getElementById('jump-select');
        surahData.forEach((v, i) => jump.add(new Option(`Verse ${i+1}`, i)));
        loadVerse();
    }

    function loadVerse() {
        isCorrect = false;
        const verse = surahData[currentIdx];
        document.getElementById('v-num').innerText = currentIdx + 1;
        document.getElementById('jump-select').value = currentIdx;
        document.getElementById('trans-text').innerText = verse.trans;
        document.getElementById('status-msg').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        userSeq = [];
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        const dropEl = document.getElementById('drop-zone'), bankEl = document.getElementById('word-bank'), verse = surahData[currentIdx];
        dropEl.innerHTML = ""; bankEl.innerHTML = "";

        userSeq.forEach((w, i) => {
            let d = document.createElement('div'); d.className = 'word placed'; d.innerText = w;
            d.onclick = () => { if(!isCorrect) { userSeq.splice(i,1); updateUI(); } };
            dropEl.appendChild(d);
        });

        let sortedBank = [...verse.words].sort();
        let tempUser = [...userSeq];
        sortedBank.forEach(w => {
            let d = document.createElement('div'); d.className = 'word'; d.innerText = w;
            if (tempUser.includes(w)) {
                d.style.visibility = "hidden";
                tempUser.splice(tempUser.indexOf(w), 1);
            } else {
                d.onclick = () => handleSelection(w);
            }
            bankEl.appendChild(d);
        });
    }

    function handleSelection(w) {
        if(isCorrect) return;
        const verse = surahData[currentIdx];
        if (w === verse.words[userSeq.length]) {
            userSeq.push(w);
            score += 5;
            document.getElementById('status-msg').innerText = "✅ Correct!";
            document.getElementById('status-msg').style.color = "var(--success)";
        } else {
            score -= 5;
            document.getElementById('status-msg').innerText = "❌ Try again!";
            document.getElementById('status-msg').style.color = "var(--danger)";
        }
        
        if (userSeq.length === verse.words.length) {
            isCorrect = true;
            document.getElementById('next-btn').style.display = "block";
        }
        updateUI();
    }

    async function playAudio() {
        const val = document.getElementById('reciter-select').value;
        const vNum = currentIdx + 1;
        const audio = document.getElementById('quran-audio');
        
        try {
            if (isNaN(val)) {
                // Fetch from Backup Server (Muallim/Kids styles)
                audio.src = `https://everyayah.com/data/${val}/067${String(vNum).padStart(3, '0')}.mp3`;
            } else {
                // Fetch from Quran.com API (Reciter 168 etc.)
                const res = await fetch(`https://api.quran.com/api/v4/recitations/${val}/by_ayah/67:${vNum}`);
                const data = await res.json();
                let url = data.audio_files[0].url;
                audio.src = url.startsWith('http') ? url : `https://verses.quran.com/${url}`;
            }
            audio.play();
        } catch(e) { console.error(e); }
        if(!isCorrect) score -= 2;
        updateUI();
    }

    function giveHint() {
        if(isCorrect) return;
        score -= 5;
        const verse = surahData[currentIdx];
        const nextWordNeeded = verse.words[userSeq.length];
        
        const bankChildren = document.getElementById('word-bank').children;
        for (let btn of bankChildren) {
            if (btn.innerText === nextWordNeeded && btn.style.visibility !== "hidden") {
                btn.classList.add('hint-active');
                setTimeout(() => btn.classList.remove('hint-active'), 1500);
                break;
            }
        }
        updateUI();
    }

    function jumpToVerse(val) { currentIdx = parseInt(val); loadVerse(); }
    function prevVerse() { if(currentIdx > 0) { currentIdx--; loadVerse(); } }
    function nextVerse() { if(currentIdx < surahData.length - 1) { currentIdx++; loadVerse(); } }

    window.onload = init;
</script>
</body>
</html>
